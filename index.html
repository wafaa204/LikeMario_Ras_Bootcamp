<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IoT Mario Adventure - Cyber Edition</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: #050811;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #00f0ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.25);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #00f0ff;
            max-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            max-width: 900px;
        }

        /* Touch Controls for Mobile */
        #touch-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
            margin-top: 10px;
            padding: 0 10px;
        }

        .d-pad, .action-pad {
            display: flex;
            gap: 10px;
        }

        .touch-btn {
            background: rgba(13, 25, 48, 0.85);
            border: 2px solid #00f0ff;
            color: #00f0ff;
            font-size: 22px;
            font-weight: bold;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .touch-btn:active {
            background: #00f0ff;
            color: #000;
            transform: scale(0.95);
        }

        .btn-jump {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            color: #00ff88;
            width: 70px;
            height: 70px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .btn-jump:active {
            background: #00ff88;
            color: #000;
        }

        /* Overlay UI */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 8, 17, 0.93);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px currentColor;
        }

        .overlay p {
            font-size: 1rem;
            color: #8b949e;
            max-width: 500px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .btn {
            background-color: #00f0ff;
            color: #050811;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #70f8ff;
            transform: scale(1.05);
        }

        .hidden {
            display: none !important;
        }

        @media (min-width: 1024px) and (hover: hover) {
            #touch-controls {
                display: none;
            }
        }
    </style>
</head>
<body>

    <h1>📡 Master Mario IoT Adventure</h1>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="900" height="450"></canvas>

        <!-- Start Screen -->
        <div id="startScreen" class="overlay">
            <h2 style="color: #00f0ff;">Build the Ultimate IoT System!</h2>
            <p>Help Mario collect all <b>8 IoT components</b> across the system before the 60-second timer runs out. Avoid system bugs 👾!</p>
            <button id="startBtn" class="btn">START ADVENTURE</button>
        </div>

        <!-- Win/Game Over Screen -->
        <div id="endScreen" class="overlay hidden">
            <h2 id="endTitle">CONGRATULATIONS!</h2>
            <p id="endMessage">You successfully built the IoT network!</p>
            <button id="restartBtn" class="btn">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Mobile Touch Controls -->
    <div id="touch-controls">
        <div class="d-pad">
            <div id="btnLeft" class="touch-btn">◀</div>
            <div id="btnRight" class="touch-btn">▶</div>
        </div>
        <div class="action-pad">
            <div id="btnJump" class="touch-btn btn-jump">▲</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const startScreen = document.getElementById("startScreen");
        const endScreen = document.getElementById("endScreen");
        const endTitle = document.getElementById("endTitle");
        const endMessage = document.getElementById("endMessage");
        const startBtn = document.getElementById("startBtn");
        const restartBtn = document.getElementById("restartBtn");

        // صورة ماريو
        const marioImg = new Image();
        marioImg.src = "mario.png";

        // ==========================================
        // 🎵 محرك الأصوات (Web Audio API Synthesizer)
        // ==========================================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } 
            else if (type === 'collect') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.08); // E5
                osc.frequency.setValueAtTime(783.99, now + 0.16); // G5
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } 
            else if (type === 'win') {
                const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99];
                notes.forEach((freq, idx) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.type = 'square';
                    o.frequency.value = freq;
                    g.gain.setValueAtTime(0.15, now + idx * 0.1);
                    g.gain.linearRampToValueAtTime(0.01, now + idx * 0.1 + 0.2);
                    o.start(now + idx * 0.1);
                    o.stop(now + idx * 0.1 + 0.2);
                });
            } 
            else if (type === 'lose') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.4);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        }

        // ==========================================
        // 🌌 خلفية متحركة (Cyber Particles)
        // ==========================================
        const bgParticles = [];
        for (let i = 0; i < 40; i++) {
            bgParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 3 + 1,
                speedY: Math.random() * 0.5 + 0.2,
                opacity: Math.random() * 0.5 + 0.2
            });
        }

        let gameState = "MENU";
        let timer = 60;
        let timerInterval = null;
        let score = 0;

        const player = {
            x: 40,
            y: 350,
            width: 35,
            height: 45,
            vx: 0,
            vy: 0,
            speed: 6.5,
            jumpPower: -12.5,
            gravity: 0.5,
            isJumping: false
        };

        const platforms = [
            { x: 0, y: 410, width: 900, height: 40 },
            { x: 80, y: 330, width: 120, height: 15 },
            { x: 250, y: 270, width: 130, height: 15 },
            { x: 430, y: 210, width: 140, height: 15 },
            { x: 620, y: 270, width: 130, height: 15 },
            { x: 730, y: 330, width: 130, height: 15 },
            { x: 180, y: 160, width: 120, height: 15 },
            { x: 620, y: 160, width: 120, height: 15 }
        ];

        let iotItems = [];
        const initialIotItems = [
            { x: 110, y: 295, symbol: "📡" },
            { x: 290, y: 235, symbol: "📟" },
            { x: 480, y: 175, symbol: "💡" },
            { x: 660, y: 235, symbol: "🎛️" },
            { x: 760, y: 295, symbol: "🔋" },
            { x: 210, y: 125, symbol: "📷" },
            { x: 650, y: 125, symbol: "🔒" },
            { x: 40,  y: 375, symbol: "🌐" }
        ];

        let obstacles = [];
        const initialObstacles = [
            { x: 260, y: 250, width: 20, height: 20, vx: 0.8, minX: 250, maxX: 350, symbol: "👾" },
            { x: 630, y: 250, width: 20, height: 20, vx: 0.8, minX: 620, maxX: 720, symbol: "👾" },
            { x: 400, y: 390, width: 20, height: 20, vx: 1.0, minX: 250, maxX: 600, symbol: "⚠️" }
        ];

        const keys = { left: false, right: false, jump: false };

        window.addEventListener("keydown", (e) => {
            if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
            if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
            if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") {
                if (!keys.jump && !player.isJumping && gameState === "PLAYING") {
                    playSound('jump');
                }
                keys.jump = true;
            }
        });

        window.addEventListener("keyup", (e) => {
            if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
            if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
            if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") keys.jump = false;
        });

        function bindTouchBtn(btnId, keyName) {
            const btn = document.getElementById(btnId);
            const start = (e) => { 
                e.preventDefault(); 
                if (keyName === 'jump' && !keys.jump && !player.isJumping && gameState === "PLAYING") {
                    playSound('jump');
                }
                keys[keyName] = true; 
            };
            const end = (e) => { e.preventDefault(); keys[keyName] = false; };

            btn.addEventListener("touchstart", start);
            btn.addEventListener("touchend", end);
            btn.addEventListener("mousedown", start);
            btn.addEventListener("mouseup", end);
        }

        bindTouchBtn("btnLeft", "left");
        bindTouchBtn("btnRight", "right");
        bindTouchBtn("btnJump", "jump");

        startBtn.addEventListener("click", startGame);
        restartBtn.addEventListener("click", startGame);

        function resetGame() {
            player.x = 40;
            player.y = 350;
            player.vx = 0;
            player.vy = 0;
            score = 0;
            timer = 60;

            iotItems = initialIotItems.map(item => ({ ...item, collected: false }));
            obstacles = JSON.parse(JSON.stringify(initialObstacles));
        }

        function startGame() {
            resetGame();
            gameState = "PLAYING";
            startScreen.classList.add("hidden");
            endScreen.classList.add("hidden");

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameState === "PLAYING") {
                    timer--;
                    if (timer <= 0) {
                        gameOver(false);
                    }
                }
            }, 1000);
        }

        function gameOver(isWin) {
            gameState = isWin ? "WIN" : "GAMEOVER";
            clearInterval(timerInterval);

            if (isWin) {
                playSound('win');
                endTitle.innerText = "🎉 CONGRATULATIONS!";
                endTitle.style.color = "#00ff88";
                endMessage.innerHTML = `Awesome Job! Mario collected all <b>8 IoT devices</b> with <b>${timer}s</b> remaining!`;
            } else {
                playSound('lose');
                endTitle.innerText = "💥 SYSTEM FAILURE!";
                endTitle.style.color = "#ff0055";
                endMessage.innerText = timer <= 0 ? "Time's up! The network deployment failed." : "Oops! Mario hit a system threat/bug. Try again!";
            }

            endScreen.classList.remove("hidden");
        }

        function update() {
            if (gameState !== "PLAYING") return;

            if (keys.right) player.vx = player.speed;
            else if (keys.left) player.vx = -player.speed;
            else player.vx = 0;

            if (keys.jump && !player.isJumping) {
                player.vy = player.jumpPower;
                player.isJumping = true;
            }

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            player.isJumping = true;
            platforms.forEach(p => {
                if (
                    player.x < p.x + p.width &&
                    player.x + player.width > p.x &&
                    player.y + player.height >= p.y &&
                    player.y + player.height <= p.y + p.height + player.vy
                ) {
                    player.y = p.y - player.height;
                    player.vy = 0;
                    player.isJumping = false;
                }
            });

            obstacles.forEach(obs => {
                obs.x += obs.vx;
                if (obs.x <= obs.minX || obs.x >= obs.maxX) {
                    obs.vx *= -1;
                }

                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    gameOver(false);
                }
            });

            let collectedCount = 0;
            iotItems.forEach(item => {
                if (!item.collected) {
                    if (
                        player.x < item.x + 22 &&
                        player.x + player.width > item.x &&
                        player.y < item.y + 22 &&
                        player.y + player.height > item.y
                    ) {
                        item.collected = true;
                        score += 10;
                        playSound('collect'); // صوت الجمع
                    }
                } else {
                    collectedCount++;
                }
            });

            if (collectedCount === iotItems.length) {
                gameOver(true);
            }
        }

        function drawBackground() {
            // خلفية سوداء سايبر
            ctx.fillStyle = "#050811";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // شبكة إلكترونية خفيفة (Cyber Grid)
            ctx.strokeStyle = "rgba(0, 240, 255, 0.05)";
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // الجسيمات المضيئة المتحركة
            bgParticles.forEach(p => {
                p.y -= p.speedY;
                if (p.y < 0) p.y = canvas.height;

                ctx.fillStyle = `rgba(0, 240, 255, ${p.opacity})`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
        }

        function draw() {
            drawBackground();

            // رسم المنصات مع توهج النيون (Neon Glow)
            platforms.forEach(p => {
                ctx.fillStyle = "#0d1930";
                ctx.fillRect(p.x, p.y, p.width, p.height);

                ctx.strokeStyle = "#00f0ff";
                ctx.lineWidth = 2;
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#00f0ff";
                ctx.strokeRect(p.x, p.y, p.width, p.height);
                ctx.shadowBlur = 0;
            });

            // رسم أجهزة الـ IoT
            ctx.font = "22px Arial";
            iotItems.forEach(item => {
                if (!item.collected) {
                    ctx.fillText(item.symbol, item.x, item.y);
                }
            });

            // رسم العوائق
            obstacles.forEach(obs => {
                ctx.fillText(obs.symbol, obs.x, obs.y + 15);
            });

            // رسم ماريو
            ctx.drawImage(marioImg, player.x, player.y, player.width, player.height);

            // رسم الواجهة العلوية (HUD)
            ctx.fillStyle = "#00f0ff";
            ctx.font = "bold 16px 'Segoe UI', Tahoma";
            ctx.shadowBlur = 5;
            ctx.shadowColor = "#00f0ff";
            ctx.fillText(`📡 Devices: ${score / 10}/${iotItems.length}`, 25, 35);

            ctx.fillStyle = timer <= 15 ? "#ff0055" : "#00ff88";
            ctx.shadowColor = timer <= 15 ? "#ff0055" : "#00ff88";
            ctx.font = "bold 18px 'Segoe UI', Tahoma";
            ctx.fillText(`⏱️ Time: ${timer}s`, 750, 35);
            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
