<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- منع التكبير والتمرير في الهواتف -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IoT Mario Adventure</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            margin: 0;
            padding: 10px;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            touch-action: manipulation;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #58a6ff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 1.4rem;
            text-align: center;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 25px rgba(88, 166, 255, 0.2);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #30363d;
            max-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: linear-gradient(to bottom, #161b22, #0d1117);
            display: block;
            width: 100%;
            height: auto;
            max-width: 900px;
        }

        /* Touch Controls for Mobile */
        #touch-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 900px;
            margin-top: 10px;
            padding: 0 10px;
        }

        .d-pad, .action-pad {
            display: flex;
            gap: 10px;
        }

        .touch-btn {
            background: rgba(48, 54, 61, 0.8);
            border: 2px solid #58a6ff;
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .touch-btn:active {
            background: #58a6ff;
            transform: scale(0.95);
        }

        .btn-jump {
            background: rgba(35, 134, 54, 0.8);
            border-color: #2ea043;
            width: 70px;
            height: 70px;
        }

        .btn-jump:active {
            background: #2ea043;
        }

        /* Overlay UI */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        .overlay h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .overlay p {
            font-size: 0.95rem;
            color: #8b949e;
            max-width: 500px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        /* إخفاء أزرار اللمس على أجهزة الكومبيوتر إذا لم تكن شاشة لمس */
        @media (min-width: 1024px) and (hover: hover) {
            #touch-controls {
                display: none;
            }
        }
    </style>
</head>
<body>

    <h1>📡 Master Mario IoT Adventure</h1>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="900" height="450"></canvas>

        <!-- Start Screen -->
        <div id="startScreen" class="overlay">
            <h2>Build the Ultimate IoT System!</h2>
            <p>Help Mario collect all <b>8 IoT components</b> before the 60-second timer runs out. Avoid system bugs 👾!</p>
            <button id="startBtn" class="btn">START ADVENTURE</button>
        </div>

        <!-- Win/Game Over Screen -->
        <div id="endScreen" class="overlay hidden">
            <h2 id="endTitle">CONGRATULATIONS!</h2>
            <p id="endMessage">You successfully built the IoT network!</p>
            <button id="restartBtn" class="btn">PLAY AGAIN</button>
        </div>
    </div>

    <!-- Mobile Touch Controls -->
    <div id="touch-controls">
        <div class="d-pad">
            <div id="btnLeft" class="touch-btn">◀</div>
            <div id="btnRight" class="touch-btn">▶</div>
        </div>
        <div class="action-pad">
            <div id="btnJump" class="touch-btn btn-jump">▲</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const startScreen = document.getElementById("startScreen");
        const endScreen = document.getElementById("endScreen");
        const endTitle = document.getElementById("endTitle");
        const endMessage = document.getElementById("endMessage");
        const startBtn = document.getElementById("startBtn");
        const restartBtn = document.getElementById("restartBtn");

        // تحميل صورة ماريو
        const marioImg = new Image();
        marioImg.src = "mario.png";

        let gameState = "MENU";
        let timer = 60;
        let timerInterval = null;
        let score = 0;

        // إعدادات اللاعب
        const player = {
            x: 40,
            y: 350,
            width: 35,
            height: 45,
            vx: 0,
            vy: 0,
            speed: 6.5,
            jumpPower: -12.5,
            gravity: 0.5,
            isJumping: false
        };

        // المنصات
        const platforms = [
            { x: 0, y: 410, width: 900, height: 40 },
            { x: 80, y: 330, width: 120, height: 15 },
            { x: 250, y: 270, width: 130, height: 15 },
            { x: 430, y: 210, width: 140, height: 15 },
            { x: 620, y: 270, width: 130, height: 15 },
            { x: 730, y: 330, width: 130, height: 15 },
            { x: 180, y: 160, width: 120, height: 15 },
            { x: 620, y: 160, width: 120, height: 15 }
        ];

        // 8 عناصر IoT
        let iotItems = [];
        const initialIotItems = [
            { x: 110, y: 295, symbol: "📡" },
            { x: 290, y: 235, symbol: "📟" },
            { x: 480, y: 175, symbol: "💡" },
            { x: 660, y: 235, symbol: "🎛️" },
            { x: 760, y: 295, symbol: "🔋" },
            { x: 210, y: 125, symbol: "📷" },
            { x: 650, y: 125, symbol: "🔒" },
            { x: 40,  y: 375, symbol: "🌐" }
        ];

        // العوائق
        let obstacles = [];
        const initialObstacles = [
            { x: 260, y: 250, width: 20, height: 20, vx: 0.8, minX: 250, maxX: 350, symbol: "👾" },
            { x: 630, y: 250, width: 20, height: 20, vx: 0.8, minX: 620, maxX: 720, symbol: "👾" },
            { x: 400, y: 390, width: 20, height: 20, vx: 1.0, minX: 250, maxX: 600, symbol: "⚠️" }
        ];

        // حالة المفاتيح (سواء كيبورد أو لمس)
        const keys = {
            left: false,
            right: false,
            jump: false
        };

        // التحكم عن طريق الكيبورد
        window.addEventListener("keydown", (e) => {
            if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
            if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
            if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") keys.jump = true;
        });

        window.addEventListener("keyup", (e) => {
            if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
            if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
            if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") keys.jump = false;
        });

        // التحكم عن طريق اللمس للهواتف (Touch Events)
        function bindTouchBtn(btnId, keyName) {
            const btn = document.getElementById(btnId);
            
            const start = (e) => { e.preventDefault(); keys[keyName] = true; };
            const end = (e) => { e.preventDefault(); keys[keyName] = false; };

            btn.addEventListener("touchstart", start);
            btn.addEventListener("touchend", end);
            btn.addEventListener("mousedown", start);
            btn.addEventListener("mouseup", end);
        }

        bindTouchBtn("btnLeft", "left");
        bindTouchBtn("btnRight", "right");
        bindTouchBtn("btnJump", "jump");

        startBtn.addEventListener("click", startGame);
        restartBtn.addEventListener("click", startGame);

        function resetGame() {
            player.x = 40;
            player.y = 350;
            player.vx = 0;
            player.vy = 0;
            score = 0;
            timer = 60;

            iotItems = initialIotItems.map(item => ({ ...item, collected: false }));
            obstacles = JSON.parse(JSON.stringify(initialObstacles));
        }

        function startGame() {
            resetGame();
            gameState = "PLAYING";
            startScreen.classList.add("hidden");
            endScreen.classList.add("hidden");

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameState === "PLAYING") {
                    timer--;
                    if (timer <= 0) {
                        gameOver(false);
                    }
                }
            }, 1000);
        }

        function gameOver(isWin) {
            gameState = isWin ? "WIN" : "GAMEOVER";
            clearInterval(timerInterval);

            if (isWin) {
                endTitle.innerText = "🎉 CONGRATULATIONS!";
                endTitle.style.color = "#2ea043";
                endMessage.innerHTML = `Awesome Job! Mario collected all <b>8 IoT devices</b> with <b>${timer}s</b> remaining!`;
            } else {
                endTitle.innerText = "💥 SYSTEM FAILURE!";
                endTitle.style.color = "#f85149";
                endMessage.innerText = timer <= 0 ? "Time's up! The network deployment failed." : "Oops! Mario hit a system threat/bug. Try again!";
            }

            endScreen.classList.remove("hidden");
        }

        function update() {
            if (gameState !== "PLAYING") return;

            // Movement logic
            if (keys.right) player.vx = player.speed;
            else if (keys.left) player.vx = -player.speed;
            else player.vx = 0;

            if (keys.jump && !player.isJumping) {
                player.vy = player.jumpPower;
                player.isJumping = true;
            }

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // Platforms
            player.isJumping = true;
            platforms.forEach(p => {
                if (
                    player.x < p.x + p.width &&
                    player.x + player.width > p.x &&
                    player.y + player.height >= p.y &&
                    player.y + player.height <= p.y + p.height + player.vy
                ) {
                    player.y = p.y - player.height;
                    player.vy = 0;
                    player.isJumping = false;
                }
            });

            // Obstacles
            obstacles.forEach(obs => {
                obs.x += obs.vx;
                if (obs.x <= obs.minX || obs.x >= obs.maxX) {
                    obs.vx *= -1;
                }

                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    gameOver(false);
                }
            });

            // Items
            let collectedCount = 0;
            iotItems.forEach(item => {
                if (!item.collected) {
                    if (
                        player.x < item.x + 22 &&
                        player.x + player.width > item.x &&
                        player.y < item.y + 22 &&
                        player.y + player.height > item.y
                    ) {
                        item.collected = true;
                        score += 10;
                    }
                } else {
                    collectedCount++;
                }
            });

            if (collectedCount === iotItems.length) {
                gameOver(true);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Platforms
            ctx.fillStyle = "#21262d";
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.strokeStyle = "#30363d";
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, p.y, p.width, p.height);
            });

            // Items
            ctx.font = "22px Arial";
            iotItems.forEach(item => {
                if (!item.collected) {
                    ctx.fillText(item.symbol, item.x, item.y);
                }
            });

            // Obstacles
            obstacles.forEach(obs => {
                ctx.fillText(obs.symbol, obs.x, obs.y + 15);
            });

            // Mario Player
            ctx.drawImage(marioImg, player.x, player.y, player.width, player.height);

            // HUD
            ctx.fillStyle = "#c9d1d9";
            ctx.font = "bold 16px 'Segoe UI', Tahoma";
            ctx.fillText(`📡 Devices: ${score / 10}/${iotItems.length}`, 25, 35);

            // Timer
            ctx.fillStyle = timer <= 15 ? "#f85149" : "#2ea043";
            ctx.font = "bold 18px 'Segoe UI', Tahoma";
            ctx.fillText(`⏱️ Time: ${timer}s`, 750, 35);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
